name: Security (reusable)

on:
  workflow_call:
    inputs:
      codeql_languages:
        description: "JSON array string e.g. '[\"python\",\"go\"]'"
        type: string
        default: '["python","go","javascript-typescript"]'

jobs:
  probe-sast:
    name: Probe — sast matrix
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(inputs.codeql_languages) }}
    steps:
      - run: echo "language=${{ matrix.language }}"
