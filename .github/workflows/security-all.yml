name: Security (reusable)

on:
  workflow_call:
    inputs:
      engine_dockerfile:
        type: string
        default: "./engine"
      web_dockerfile:
        type: string
        default: "./web"
      web_build_args:
        type: string
        default: "VITE_ENGINE_URL=http://localhost:8080"
      go_version:
        type: string
        default: "1.25"
      node_version:
        type: string
        default: "20"
      has_go:
        type: boolean
        default: true
      has_node:
        type: boolean
        default: true
      has_containers:
        type: boolean
        default: true
      has_codeql:
        description: "Set false for private repos on free GitHub plan (no Advanced Security)"
        type: boolean
        default: true
      python_dev_extra:
        description: "PEP 621 optional-dep extra to install for pip-audit. Use 'dev' if pyproject uses [project.optional-dependencies.dev], empty string if using [tool.uv] dev-dependencies."
        type: string
        default: "dev"

jobs:
  # ── 1. Secret scanning ────────────────────────────────────────────────────
  secrets:
    name: Secret scanning (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      # Compute a safe base SHA that avoids the BASE==HEAD error.
      # github.event.before is the zero SHA on first push, which TruffleHog
      # cannot resolve, causing it to default to HEAD (making base==head).
      - name: Compute scan base
        id: base
        run: |
          PR_BASE="${{ github.event.pull_request.base.sha }}"
          BEFORE="${{ github.event.before }}"
          if [ -n "$PR_BASE" ]; then
            echo "sha=$PR_BASE" >> $GITHUB_OUTPUT
          elif [ -n "$BEFORE" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
            echo "sha=$BEFORE" >> $GITHUB_OUTPUT
          else
            # Initial push — leave empty to scan all history from scratch
            echo "sha=" >> $GITHUB_OUTPUT
          fi

      - uses: trufflesecurity/trufflehog@3fc0c2aa6648d54242e4af6fbfde0701796e4fb0  # main
        with:
          path: ./
          base: ${{ steps.base.outputs.sha }}
          head: ${{ github.sha }}
          extra_args: --only-verified

      # Artifact: whole-repo scan → JSON for DefectDojo import.
      - name: TruffleHog — JSON artifact
        if: always()
        continue-on-error: true
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sh -s -- -b /usr/local/bin 2>/dev/null || true
          trufflehog git file://. --only-verified --json 2>/dev/null \
            | python3 -c "import sys,json; lines=[json.loads(l) for l in sys.stdin if l.strip()]; json.dump(lines, open('trufflehog.json','w'))" \
            || echo "[]" > trufflehog.json

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: security-trufflehog
          path: trufflehog.json
          if-no-files-found: ignore
          retention-days: 30

  # ── 2. Dependency vulnerabilities ────────────────────────────────────────
  deps:
    name: Dependency vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
        with:
          version: "latest"

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        if: ${{ inputs.has_go }}
        with:
          go-version: ${{ inputs.go_version }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        if: ${{ inputs.has_node }}
        with:
          node-version: ${{ inputs.node_version }}

      - name: Python — pip-audit
        run: |
          cd engine
          if [ -n "${{ inputs.python_dev_extra }}" ]; then
            uv sync --extra "${{ inputs.python_dev_extra }}"
          else
            uv sync
          fi
          # --with pip-audit installs it temporarily into the project venv without
          # requiring it in dev-dependencies (works for all consuming repos)
          # CVE-2026-3219: pip itself has a CVE with no upstream fix as of 2026-04
          uv run --with pip-audit pip-audit --ignore-vuln CVE-2026-3219 --format json > pip-audit.json

      - name: Go — govulncheck
        if: ${{ inputs.has_go }}
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd cli && govulncheck -json ./... > govulncheck.json

      - name: npm — audit
        if: ${{ inputs.has_node }}
        run: |
          cd web
          npm install
          npm audit --json > npm-audit.json 2>/dev/null || true
          npm audit --audit-level=critical

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: security-deps
          path: |
            engine/pip-audit.json
            cli/govulncheck.json
            web/npm-audit.json
          if-no-files-found: ignore
          retention-days: 30

  # ── 3. Container scanning (Trivy) ─────────────────────────────────────────
  containers:
    name: Container scanning (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        if: ${{ inputs.has_containers }}

      - name: Download Trivy ignore list
        if: ${{ inputs.has_containers }}
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/Scorp10N/devsecops/main/configs/trivy-ignore.txt \
            -o .trivyignore

      - name: Build engine image
        if: ${{ inputs.has_containers }}
        run: docker build ${{ inputs.engine_dockerfile }} -t scan-engine:ci

      - name: Scan engine image
        if: ${{ inputs.has_containers }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # master
        with:
          image-ref: scan-engine:ci
          format: sarif
          output: trivy-engine.sarif
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Build web image
        if: ${{ inputs.has_containers }}
        run: |
          BUILD_ARGS=""
          for arg in ${{ inputs.web_build_args }}; do
            BUILD_ARGS="$BUILD_ARGS --build-arg $arg"
          done
          docker build $BUILD_ARGS ${{ inputs.web_dockerfile }} -t scan-web:ci

      - name: Scan web image
        if: ${{ inputs.has_containers }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # master
        with:
          image-ref: scan-web:ci
          format: sarif
          output: trivy-web.sarif
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Upload Trivy engine results to GitHub Security tab
        if: ${{ always() && inputs.has_containers }}
        uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a  # v3.35.2
        with:
          sarif_file: trivy-engine.sarif
          category: trivy-engine

      - name: Upload Trivy web results to GitHub Security tab
        if: ${{ always() && inputs.has_containers }}
        uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a  # v3.35.2
        with:
          sarif_file: trivy-web.sarif
          category: trivy-web

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: ${{ always() && inputs.has_containers }}
        with:
          name: security-trivy
          path: |
            trivy-engine.sarif
            trivy-web.sarif
          if-no-files-found: ignore
          retention-days: 30

  # ── 4. Static analysis — CodeQL per language ─────────────────────────────
  # CodeQL uploads SARIF to GitHub Security tab (requires Advanced Security on private repos).
  # Set has_codeql: false for private repos on free GitHub plan.
  sast-python:
    name: Static analysis (CodeQL) / python
    runs-on: ubuntu-latest
    if: ${{ inputs.has_codeql }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: github/codeql-action/init@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a  # v3.35.2
        with:
          languages: python
      - uses: github/codeql-action/autobuild@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a  # v3.35.2
      - uses: github/codeql-action/analyze@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a  # v3.35.2
        with:
          category: "/language:python"

  sast-go:
    name: Static analysis (CodeQL) / go
    runs-on: ubuntu-latest
    if: ${{ inputs.has_codeql && inputs.has_go }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: github/codeql-action/init@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a  # v3.35.2
        with:
          languages: go
      - uses: github/codeql-action/autobuild@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a  # v3.35.2
      - uses: github/codeql-action/analyze@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a  # v3.35.2
        with:
          category: "/language:go"

  sast-javascript:
    name: Static analysis (CodeQL) / javascript-typescript
    runs-on: ubuntu-latest
    if: ${{ inputs.has_codeql && inputs.has_node }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: github/codeql-action/init@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a  # v3.35.2
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/autobuild@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a  # v3.35.2
      - uses: github/codeql-action/analyze@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a  # v3.35.2
        with:
          category: "/language:javascript-typescript"

  # ── 5. Custom SAST — Semgrep (main push only, non-blocking on PRs) ────────
  semgrep:
    name: Custom SAST (Semgrep)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Download Semgrep rules
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/Scorp10N/devsecops/main/configs/semgrep.yml \
            -o .semgrep-platform-rules.yml

      - name: Run Semgrep
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d  # v1
        with:
          config: .semgrep-platform-rules.yml
          generateSarif: "1"
        env:
          SEMGREP_APP_TOKEN: ""

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: security-semgrep
          path: semgrep.sarif
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload Semgrep results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a  # v3.35.2
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ── 6. Collect findings → security-data ──────────────────────────────────
  collect:
    name: Collect findings → security-data
    runs-on: ubuntu-latest
    needs: [secrets, deps, containers, sast-python, sast-go, sast-javascript, semgrep]
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout devsecops (for normalization scripts)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          repository: Scorp10N/devsecops
          path: devsecops

      - name: Download scan artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run download ${{ github.run_id }} \
            --repo ${{ github.repository }} \
            --dir findings-raw/ 2>/dev/null || true

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Normalize findings
        run: |
          python3 devsecops/scripts/normalize_findings.py \
            findings-raw/ \
            "${{ github.repository }}" \
            "${{ github.run_id }}"

      - name: Clone security-data and update findings
        env:
          SECURITY_DATA_PAT: ${{ secrets.SECURITY_DATA_PAT }}
        run: |
          REPO_SLUG="${{ github.repository }}"
          REPO_SLUG="${REPO_SLUG#*/}"
          TODAY=$(date +%Y-%m-%d)

          git clone \
            https://x-access-token:${SECURITY_DATA_PAT}@github.com/Scorp10N/security-data.git \
            sd

          mkdir -p sd/findings/${REPO_SLUG}/latest
          cp normalized/${REPO_SLUG}/normalized.json sd/findings/${REPO_SLUG}/latest/

          mkdir -p sd/posture

          python3 devsecops/scripts/update_posture.py sd/findings/ \
            > sd/posture/snapshot-${TODAY}.json

          cp sd/posture/snapshot-${TODAY}.json sd/posture/snapshot-latest.json

          cd sd
          git config user.email "ci@scorp10n.github"
          git config user.name "Security Bot"
          git add findings/ posture/
          git diff --cached --quiet \
            || git commit -m "findings: ${{ github.repository }} run ${{ github.run_id }}"
          git push
