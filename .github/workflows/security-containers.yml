name: Security (containers)

on:
  workflow_call:
    inputs:
      images:
        description: 'JSON array of image references, e.g. ["nginx:alpine","tailscale/tailscale:latest"]'
        type: string
        required: true
      repo_name:
        description: 'Slug used for findings package name in ghcr.io (defaults to calling repo slug)'
        type: string
        default: ""
      registry_auth:
        description: "'github' to login to ghcr.io with GITHUB_TOKEN before scanning private images"
        type: string
        default: ""

jobs:
  # ── 1. Container image scanning ──────────────────────────────────────────
  trivy:
    name: Trivy — ${{ matrix.image }}
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(inputs.images) }}
    steps:
      - name: Sanitize image name for artifact key
        id: key
        env:
          IMAGE: ${{ matrix.image }}
        run: |
          SAFE=$(echo "$IMAGE" | tr '/.:@' '----')
          echo "safe=$SAFE" >> $GITHUB_OUTPUT

      - name: Login to ghcr.io (private images)
        if: inputs.registry_auth == 'github'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Scan image
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8  # v0.30.0
        with:
          image-ref: ${{ matrix.image }}
          format: sarif
          output: trivy-${{ steps.key.outputs.safe }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload to GitHub Security tab
        uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a  # v3.35.2
        if: always()
        with:
          sarif_file: trivy-${{ steps.key.outputs.safe }}.sarif
          category: trivy-${{ steps.key.outputs.safe }}

      - name: Upload artifact for local retention
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: security-trivy-${{ steps.key.outputs.safe }}
          path: trivy-${{ steps.key.outputs.safe }}.sarif
          if-no-files-found: ignore
          retention-days: 30

      - name: Install oras
        if: '!cancelled() && github.ref == ''refs/heads/main'' && github.event_name == ''push'''
        run: |
          curl -sSfL https://github.com/oras-project/oras/releases/download/v1.3.2/oras_1.3.2_linux_amd64.tar.gz \
            | tar -xz oras
          sudo mv oras /usr/local/bin/oras

      - name: Push findings to ghcr.io
        if: '!cancelled() && github.ref == ''refs/heads/main'' && github.event_name == ''push'''
        env:
          GH_TOKEN: ${{ github.token }}
          ACTOR: ${{ github.actor }}
          CALLING_REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          INPUT_REPO_NAME: ${{ inputs.repo_name }}
          SAFE_KEY: ${{ steps.key.outputs.safe }}
        run: |
          echo "$GH_TOKEN" | oras login ghcr.io -u "$ACTOR" --password-stdin
          DATE=$(date -u +%Y-%m-%d)
          if [ -n "$INPUT_REPO_NAME" ]; then
            SLUG="$INPUT_REPO_NAME"
          else
            SLUG="${CALLING_REPO#*/}"
          fi
          SARIF_FILE="trivy-${SAFE_KEY}.sarif"
          if [ -f "$SARIF_FILE" ]; then
            oras push "ghcr.io/scorp10n/findings-${SLUG}-${SAFE_KEY}:latest" \
              --annotation "run_id=${RUN_ID}" \
              --annotation "scan_date=${DATE}" \
              --annotation "source_repo=${CALLING_REPO}" \
              "${SARIF_FILE}:application/sarif+json" \
              || echo "::warning::oras push failed — findings NOT stored in ghcr.io"
            oras tag "ghcr.io/scorp10n/findings-${SLUG}-${SAFE_KEY}:latest" \
              "ghcr.io/scorp10n/findings-${SLUG}-${SAFE_KEY}:${DATE}" \
              || echo "::warning::oras tag failed — dated tag not created"
          fi

  # ── 2. Secret scanning ────────────────────────────────────────────────────
  trufflehog:
    name: TruffleHog secrets scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Compute scan base
        id: base
        env:
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          BEFORE: ${{ github.event.before }}
        run: |
          if [ -n "$PR_BASE" ]; then
            echo "sha=$PR_BASE" >> $GITHUB_OUTPUT
          elif [ -n "$BEFORE" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
            echo "sha=$BEFORE" >> $GITHUB_OUTPUT
          else
            echo "sha=" >> $GITHUB_OUTPUT
          fi

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@17456f8c7d042d8c82c9a8ca9e937231f9f42e26  # v3.95.2
        with:
          base: ${{ steps.base.outputs.sha }}
          head: HEAD
          extra_args: --only-verified --json
        continue-on-error: true

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: security-trufflehog
          path: trufflehog.json
          if-no-files-found: ignore
          retention-days: 30
