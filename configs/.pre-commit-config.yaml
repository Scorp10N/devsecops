# Canonical pre-commit config — managed by Scorp10N/devsecops
# Synced to each repo root via GitOps. Do not edit this copy manually.
# Install in a repo: pip install pre-commit && pre-commit install
# Run all hooks: pre-commit run --all-files

default_stages: [pre-commit]
fail_fast: false

repos:
  # ── General file hygiene ──────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key
      - id: no-commit-to-branch
        args: [--branch, main]
      - id: mixed-line-ending
        args: [--fix=lf]

  # ── Python: Ruff (lint + format) — engine/ only ───────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^engine/
      - id: ruff-format
        files: ^engine/

  # ── Secret scanning (TruffleHog) ─────────────────────────────────────────
  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.88.29
    hooks:
      - id: trufflehog
        name: TruffleHog (verified secrets only)
        entry: trufflehog git file://. --since-commit HEAD --only-verified --fail
        language: golang
        pass_filenames: false
